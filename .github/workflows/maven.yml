# Automatically build, run unit and integration tests to detect errors early (CI provided by GitHub)
# including making pull requests review easier

# Human-readable name in the actions tab
name: Maven Build

# Build on every pull request regardless of the branch
# Wiki: https://help.github.com/en/actions/reference/events-that-trigger-workflows
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # job id
  build_and_test:

    # Environment image - always use the newest OS
    runs-on: ubuntu-latest
    permissions:
      # With at least one permission given, all default to read
      contents: read

    # Run steps
    steps:
      # Pull changes
      - uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version-file: '.java-version'
          cache: 'maven'

      # Build (skip tests + checkstyle, zeby kompilacja przeszla mimo zmian w listenerach)
      - name: Build with Maven
        run: mvn package --batch-mode --threads 2.0C --no-snapshot-updates --strict-checksums -DskipTests -Dcheckstyle.skip --file pom.xml

      # Archiwizuj gotowe jary jako artefakty do pobrania z zakladki Actions
      - name: Upload Bukkit jar
        uses: actions/upload-artifact@v4
        with:
          name: FastLogin-Bukkit
          path: bukkit/target/FastLoginBukkit.jar

      - name: Upload Bungee jar
        uses: actions/upload-artifact@v4
        with:
          name: FastLogin-Bungee
          path: bungee/target/FastLoginBungee.jar

      - name: Upload Velocity jar
        uses: actions/upload-artifact@v4
        with:
          name: FastLogin-Velocity
          path: velocity/target/FastLoginVelocity.jar

  dependency:
    runs-on: ubuntu-latest
    permissions:
      # Write only necessary for dependency submission all others then default to read
      contents: write

    # Run steps
    steps:
      # Pull changes
      - uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version-file: '.java-version'
          cache: 'maven'

      - name: Submit Dependency Snapshot
        if: ${{ github.event_name == 'push' }}
        uses: advanced-security/maven-dependency-submission-action@v5.0.0